# Mission configuration
# Gazebo camera_aim test version:
# takeoff -> hover -> move to test scan point -> camera_aim -> hover -> land
mission:
  takeoff_altitude: 1.20
  actions:
    - type: "takeoff"
      altitude: 0.00

    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 0.40]
      yaw: 0.00
      tolerance: 0.12

    - type: "hover"
      duration: 2.00

    - type: "move"
      frame: "world_body"
      position: [0.75, 0.00, 0.40]
      yaw: 0.00
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
      ########################################
    - type: "move"
      frame: "world_body"
      position: [0.75, 0.00, 0.40]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.25, 0.00, 0.40]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.75, 0.00, 0.40]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      ########################################
    - type: "move"
      frame: "world_body"
      position: [1.75, 0.00, 0.80]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.25, 0.00, 0.80]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [0.75, 0.00, 0.80]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      ########################################
    - type: "move"
      frame: "world_body"
      position: [0.75, 0.00, 1.20]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.25, 0.00, 1.20]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.75, 0.00, 1.20]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      ########################################
    - type: "move"
      frame: "world_body"
      position: [1.75, 0.00, 1.60]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [1.25, 0.00, 1.60]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [0.75, 0.00, 1.60]
      yaw: -1.57
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      ########################################
      
    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 1.60]
      yaw: 0.00
      tolerance: 0.12

    - type: "hover"
      duration: 2.00
      
    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 0.80]
      yaw: 0.00
      tolerance: 0.12
      
    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 0.00]
      yaw: 0.00
      tolerance: 0.12

      
    - type: "land"

system:
  use_camera_aim: false
  camera_aim_pid_p: 0.001
  camera_aim_pid_i: 0.0
  camera_aim_pid_d: 0.001
  camera_aim_target_timeout_s: 0.5
  camera_aim_stable_cycles: 20
  camera_aim_max_step: 0.05
  camera_aim_wait_first_targets_timeout_s: 2.0
  camera_aim_no_target_confirm_s: 2.0
  camera_aim_record_result_timeout_s: 5.0
  camera_aim_scan_point_timeout_s: 30.0
  auto_start_mission: false

# Mission configuration
# Gazebo camera_aim test version:
# takeoff -> hover -> move to test scan point -> camera_aim -> hover -> land
mission:
  takeoff_altitude: 0.00
  actions:
    - type: "takeoff"
      altitude: 0.00

    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 0.30]
      yaw: 0.00
      tolerance: 0.10
      yaw_tolerance_deg: 2.0
      max_xy_speed_mps: 0.30
      max_xy_speed_mps: 0.40
      max_yaw_rate_deg_s: 20.0

    - type: "hover"
      duration: 1.00

    - type: "move"
      frame: "world_body"

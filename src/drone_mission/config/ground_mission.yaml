# Mission configuration
mission:
  takeoff_altitude: 0.00
  actions:
    - type: "takeoff"
      altitude: 0.00

    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 1.10]
      yaw: 0.00
      tolerance: 0.10
      yaw_tolerance_deg: 4.0
      max_xy_speed_mps: 0.50
      max_z_speed_mps: 0.30
      max_yaw_rate_deg_s: 40.0

    - type: "hover"
      duration: 3.00

    - type: "move"
      frame: "world_body"
      position: [0.00, 0.00, 1.10]
